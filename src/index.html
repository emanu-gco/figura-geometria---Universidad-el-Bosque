<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometría - Análisis de Polígonos</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header / Título -->
  <header class="header">
    <div class="header-container">
      <h1>Análisis Geométrico de Polígonos</h1>
      <p class="subtitle">Laboratorio interactivo de matemáticas</p>
    </div>
  </header>

  <main class="main-container">
    <!-- Panel de controles -->
    <aside class="control-panel">
      <div class="panel-card">
        <h2>Parámetros del Polígono</h2>
        
        <div class="input-group">
          <label for="n-sides">Número de lados (<span id="n-val-display" class="highlight-var">n = 6</span>)</label>
          <input type="range" id="n-sides" min="3" max="20" value="6" />
        </div>
        
        <div class="input-group">
          <label for="n-number">Ingresar número manual:</label>
          <input type="number" id="n-number" min="3" max="20" value="6" />
        </div>

        <hr class="divider">
        
        <h2>Visualización</h2>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="chk-diagonals" checked />
            Mostrar Diagonales
          </label>
        </div>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="chk-midpoints" />
            Mostrar Puntos Medios
          </label>
        </div>
      </div>

      <div class="panel-card results-card">
        <h2>Resultados Analíticos</h2>
        <table class="results-table">
          <tbody>
            <tr>
              <td>Polígono</td>
              <td id="poly-name" class="val-col">Hexágono</td>
            </tr>
            <tr>
              <td>Vértices</td>
              <td id="poly-vertices" class="val-col">6</td>
            </tr>
            <tr>
              <td colspan="2" class="table-subtitle">Diagonales</td>
            </tr>
            <tr>
              <td>Desde 1 vértice (<span class="formula-inline">n-3</span>)</td>
              <td id="diag-1v" class="val-col">3</td>
            </tr>
            <tr>
              <td>Total (<span class="formula-inline">n(n-3)/2</span>)</td>
              <td id="diag-total" class="val-col">9</td>
            </tr>
          </tbody>
        </table>
      </div>
    </aside>

    <!-- Canvas SVG -->
    <section class="canvas-section">
      <div class="canvas-card">
        <svg id="poly-canvas" viewBox="0 0 600 500" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
